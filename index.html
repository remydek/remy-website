<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remy de Klein</title>
<meta name="description" content="Founder of Augmento. Building the future of immersive experiences from Dubai.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    -webkit-font-smoothing: antialiased;
  }

  .scene {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  /* BG Photo */
  .bg-photo {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 15%;
    filter: brightness(0.85);
    animation: photoIn 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transform: scale(1.08);
  }

  @keyframes photoIn {
    to { transform: scale(1); }
  }

  /* Gradient overlays for text readability */
  .overlay-left {
    position: absolute; inset: 0;
    background: linear-gradient(
      100deg,
      rgba(5,5,5,0.88) 0%,
      rgba(5,5,5,0.65) 25%,
      rgba(5,5,5,0.15) 55%,
      transparent 75%
    );
    z-index: 1;
  }

  .overlay-bottom {
    position: absolute; inset: 0;
    background: linear-gradient(
      to top,
      rgba(5,5,5,0.7) 0%,
      rgba(5,5,5,0.2) 25%,
      transparent 50%
    );
    z-index: 1;
  }

  /* Grain texture */
  .grain {
    position: absolute; inset: 0;
    z-index: 2;
    opacity: 0.035;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* Content */
  .content {
    position: absolute; inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 8vw;
  }

  .name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(3rem, 7vw, 6.5rem);
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.05;
    opacity: 0;
    transform: translateY(30px);
    animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.85rem, 1.4vw, 1.15rem);
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 1.2rem;
    opacity: 0;
    transform: translateY(20px);
    animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.75s forwards;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    margin-top: 2rem;
    opacity: 0;
    animation: lineIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
  }

  @keyframes lineIn {
    to { opacity: 1; }
  }

  .sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: clamp(0.8rem, 1.1vw, 1rem);
    color: rgba(255,255,255,0.45);
    margin-top: 1.5rem;
    line-height: 1.7;
    max-width: 380px;
    opacity: 0;
    transform: translateY(15px);
    animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
  }

  @keyframes textIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 8vw;
    opacity: 0;
    animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
  }

  .links {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .links a {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s ease;
    position: relative;
  }

  .links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: rgba(255,255,255,0.6);
    transition: width 0.3s ease;
  }

  .links a:hover {
    color: rgba(255,255,255,0.85);
  }

  .links a:hover::after {
    width: 100%;
  }

  .location {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .location .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* CTA button - subtle */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 2rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.7rem 1.6rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0;
    transition: all 0.35s ease;
    opacity: 0;
    transform: translateY(15px);
    animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.15s forwards;
  }

  .cta:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.05);
  }

  .cta svg {
    width: 14px; height: 14px;
    transition: transform 0.3s ease;
  }

  .cta:hover svg {
    transform: translateX(3px);
  }

  /* Mobile */
  @media (max-width: 768px) {
    .bg-photo {
      object-position: 55% center;
    }

    .overlay-left {
      background: linear-gradient(
        to top,
        rgba(5,5,5,0.92) 0%,
        rgba(5,5,5,0.7) 40%,
        rgba(5,5,5,0.1) 70%,
        transparent 100%
      );
    }

    .content {
      justify-content: flex-end;
      padding: 0 7vw 7rem;
    }

    .bottom-bar {
      flex-direction: column;
      gap: 1rem;
      align-items: flex-start;
      padding: 1.5rem 7vw;
    }

    .links { gap: 1.5rem; flex-wrap: wrap; }

    .name {
      font-size: clamp(2.5rem, 10vw, 3.5rem);
    }

    .sub { max-width: 100%; }
  }

  /* Cursor glow effect (desktop only) */
  @media (hover: hover) {
    .glow {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
      transform: translate(-50%, -50%);
      transition: left 0.5s ease-out, top 0.5s ease-out;
    }
  }
</style>
</head>
<body>

<div class="scene">
  <img src="remy.png" alt="Remy de Klein" class="bg-photo" loading="eager">

  <div class="overlay-left"></div>
  <div class="overlay-bottom"></div>
  <div class="grain"></div>

  <div class="content">
    <h1 class="name">Remy<br>de Klein</h1>
    <p class="tagline">Founder / Builder / Closer</p>
    <div class="divider"></div>
    <p class="sub">Building immersive experiences for the world's most ambitious brands. Founder of Augmento.</p>
    <a href="https://calendly.com/remydeklein" target="_blank" rel="noopener" class="cta">
      Let's talk
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </a>
  </div>

  <div class="bottom-bar">
    <div class="links">
      <a href="https://augmento.com" target="_blank" rel="noopener">Augmento</a>
      <a href="https://linkedin.com/in/remydeklein" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:remydeklein@gmail.com">Email</a>
      <a href="https://open.spotify.com/artist/ardeka" target="_blank" rel="noopener">Ardeka</a>
    </div>
    <div class="location">
      <span class="dot"></span>
      Dubai, UAE
    </div>
  </div>

  <div class="glow" id="glow"></div>
</div>

<script>
  // Subtle cursor glow on desktop
  const glow = document.getElementById('glow');
  if (window.matchMedia('(hover: hover)').matches && glow) {
    document.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  }
</script>

</body>
</html>
